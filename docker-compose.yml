networks:
  locust_net:
    driver: bridge

services:
  master:
    build: .
    command: >
      --master
      --headless
      --users ${USERS}
      --spawn-rate ${SPAWN_RATE}
      --run-time ${RUN_TIME}
      --csv /reports/${CSV_PREFIX}
      --csv-full-history
      --exit-code-on-error 1
    env_file:
      - .env
    volumes:
      - ./locustfile.py:/home/locust/locustfile.py:ro
      - ./config.yaml:/home/locust/config.yaml:ro
      - ./reports:/reports
    ports:
      - "5557:5557"
    networks:
      - locust_net

  worker:
    build: .
    command: --worker --master-host master
    env_file:
      - .env
    volumes:
      - ./locustfile.py:/home/locust/locustfile.py:ro
      - ./config.yaml:/home/locust/config.yaml:ro
    networks:
      - locust_net
    depends_on:
      - master
