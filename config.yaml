target:
  url: "http://your-app-host:8080"      # URL of the system under test — change this before running

# ── Load profile ──────────────────────────────────────────────────────────────
# Safe starting zone (single IP, CDN-friendly):
#   users ≤ 50, spawn_rate ≤ 5  →  ~10-25 RPS  — well below Cloudflare/WAF limits
#   users ≤ 200, spawn_rate ≤ 20 →  ~50-100 RPS — borderline; monitor for 429s
#   users > 500                  →  test origin directly or whitelist your IP first
load:
  users: 50           # concurrent users (safe start; increase gradually)
  spawn_rate: 5       # users added per second — 50 users reached in 10s
  run_time: "2m"      # keep short while validating the target isn't blocking you

workers:
  count: 1            # 1 worker is plenty for ≤200 users; add more when scaling up

scenarios:
  think_time_min: 2   # seconds — longer think time = lower RPS per user
  think_time_max: 5   # at 50 users + 3.5s avg think time → ~14 RPS total
  endpoints:
    - method: GET
      path: "/"
      name: "GET /"
      weight: 7         # relative weight; 7 out of 10 requests hit this endpoint
      expected_status: 200

    - method: GET
      path: "/products"
      name: "GET /products"
      weight: 2
      expected_status: 200

    - method: POST
      path: "/api/submit"
      name: "POST /api/submit"
      weight: 1
      expected_status: [200, 201]
      body:             # JSON body sent with every POST to this endpoint
        username: "loadtest"
        action: "ping"

kpi:
  report_interval: 10  # seconds between terminal KPI log lines during the test

output:
  csv_prefix: "results" # prefix for output files: results_stats.csv, results_history.csv, etc.
